<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📻 My Radio</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --card: #181818;
      --accent: #ff3c3c;
      --accent2: #ff8c00;
      --text: #f0ede8;
      --muted: #555;
      --border: #222;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,60,60,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,60,60,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      line-height: 1;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .tagline {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Live badge */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      padding: 4px 10px;
      border-radius: 2px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .live-badge.visible { opacity: 1; }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: white;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* Player card */
    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px;
      margin-bottom: 16px;
    }

    /* Hidden YouTube iframe */
    #yt-player { display: none; }

    /* Album art area */
    .art-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      margin-bottom: 24px;
      border-radius: 2px;
      overflow: hidden;
      background: #0d0d0d;
    }

    .art-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.4s;
    }

    .art-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
    }

    /* Vinyl spin effect when playing */
    .vinyl-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(255,60,60,0.4);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .vinyl-ring.spinning {
      opacity: 1;
      animation: spin 3s linear infinite;
    }
    @keyframes spin { from{transform:translate(-50%,-50%) rotate(0deg)} to{transform:translate(-50%,-50%) rotate(360deg)} }

    /* EQ bars */
    .eq-bars {
      position: absolute;
      bottom: 14px; left: 14px;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .eq-bars.active { opacity: 1; }
    .eq-bar {
      width: 3px;
      background: var(--accent);
      border-radius: 1px;
      animation: eq 0.8s ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(1){height:6px;animation-delay:0s}
    .eq-bar:nth-child(2){height:14px;animation-delay:0.1s}
    .eq-bar:nth-child(3){height:10px;animation-delay:0.2s}
    .eq-bar:nth-child(4){height:18px;animation-delay:0.05s}
    .eq-bar:nth-child(5){height:8px;animation-delay:0.15s}
    @keyframes eq {
      from { transform: scaleY(0.3); }
      to { transform: scaleY(1); }
    }

    /* Track info */
    .track-info {
      margin-bottom: 20px;
    }
    .track-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-index {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      margin-top: 4px;
    }

    /* Progress bar */
    .progress-wrap {
      position: relative;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      width: 0%;
      transition: width 0.5s linear;
    }
    .progress-wrap:hover .progress-bar { filter: brightness(1.2); }

    /* Time */
    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted);
      margin-top: -14px;
      margin-bottom: 20px;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 18px;
      transition: color 0.2s, transform 0.1s;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { color: var(--text); transform: scale(1.1); }
    .btn.active { color: var(--accent); }

    .btn-play {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: white !important;
      font-size: 22px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.2s;
      box-shadow: 0 0 20px rgba(255,60,60,0.3);
    }
    .btn-play:hover { transform: scale(1.08); background: #ff5555; }
    .btn-play:active { transform: scale(0.96); }

    /* Volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }
    .vol-icon { font-size: 14px; color: var(--muted); }
    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* Playlist */
    .playlist-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .playlist-header {
      padding: 14px 20px;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .playlist-count {
      background: var(--surface);
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 9px;
    }

    .playlist-list {
      max-height: 240px;
      overflow-y: auto;
    }
    .playlist-list::-webkit-scrollbar { width: 4px; }
    .playlist-list::-webkit-scrollbar-track { background: transparent; }
    .playlist-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .playlist-item:last-child { border-bottom: none; }
    .playlist-item:hover { background: rgba(255,255,255,0.03); }
    .playlist-item.active { background: rgba(255,60,60,0.07); }

    .item-num {
      font-size: 10px;
      color: var(--muted);
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }
    .playlist-item.active .item-num { color: var(--accent); }

    .item-thumb {
      width: 36px; height: 36px;
      border-radius: 2px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface);
    }

    .item-info { flex: 1; overflow: hidden; }
    .item-title {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .playlist-item.active .item-title { color: var(--accent); }
    .item-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .item-playing {
      display: none;
      gap: 2px;
      align-items: flex-end;
      height: 14px;
      flex-shrink: 0;
    }
    .playlist-item.active .item-playing { display: flex; }
    .mini-bar {
      width: 2px;
      background: var(--accent);
      border-radius: 1px;
      animation: eq 0.6s ease-in-out infinite alternate;
    }
    .mini-bar:nth-child(1){height:6px;animation-delay:0s}
    .mini-bar:nth-child(2){height:10px;animation-delay:0.15s}
    .mini-bar:nth-child(3){height:7px;animation-delay:0.08s}

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      margin-top: 12px;
      padding: 0 4px;
    }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="logo">RADIO</div>
    <div class="tagline">Your station · Your music</div>
    <div class="live-badge" id="liveBadge">
      <span class="live-dot"></span> ON AIR
    </div>
  </div>

  <!-- Hidden YouTube Player -->
  <div id="yt-player"></div>

  <div class="player-card">

    <!-- Art -->
    <div class="art-wrap">
      <img id="artImg" src="" alt="cover"/>
      <div class="art-overlay"></div>
      <div class="vinyl-ring" id="vinylRing"></div>
      <div class="eq-bars" id="eqBars">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>
    </div>

    <!-- Track info -->
    <div class="track-info">
      <div class="track-title" id="trackTitle">Loading...</div>
      <div class="track-index" id="trackIndex">TRACK 1 / 1</div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="time-row">
      <span id="timeCurrent">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn" id="btnShuffle" title="Shuffle">⇌</button>
      <button class="btn" id="btnPrev" title="Previous">⏮</button>
      <button class="btn-play" id="btnPlay">▶</button>
      <button class="btn" id="btnNext" title="Next">⏭</button>
      <button class="btn" id="btnRepeat" title="Repeat">↺</button>
    </div>

    <!-- Volume -->
    <div class="volume-row">
      <span class="vol-icon">🔈</span>
      <input type="range" id="volSlider" min="0" max="100" value="80"/>
      <span class="vol-icon">🔊</span>
    </div>

  </div>

  <!-- Playlist -->
  <div class="playlist-card">
    <div class="playlist-header">
      <span>Playlist</span>
      <span class="playlist-count" id="playlistCount">0 tracks</span>
    </div>
    <div class="playlist-list" id="playlistList"></div>
  </div>

  <div class="status-bar">
    <span>Powered by YouTube</span>
    <span id="statusQuality">HQ Audio</span>
  </div>

</div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  // ============================================================
  // 🎵 YOUR PLAYLIST — Edit this list with your YouTube video IDs
  // Get the ID from the URL: youtube.com/watch?v=VIDEO_ID_HERE
  // ============================================================
  const PLAYLIST = [
    { title: "Ta3al",       id: "4R5zsoxjARk" },
    { title: "Trag Aer",      id: "X4aEnz7zPlo" },
  ];
  // ============================================================

  let player, currentIndex = 0, isPlaying = false;
  let shuffleOn = false, repeatOn = false;
  let progressInterval;

  // Build playlist UI
  function buildPlaylist() {
    const list = document.getElementById('playlistList');
    document.getElementById('playlistCount').textContent = PLAYLIST.length + ' tracks';
    list.innerHTML = '';
    PLAYLIST.forEach((track, i) => {
      const item = document.createElement('div');
      item.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
      item.id = 'item-' + i;
      item.innerHTML = `
        <span class="item-num">${i+1}</span>
        <img class="item-thumb" src="https://img.youtube.com/vi/${track.id}/default.jpg" alt="">
        <div class="item-info">
          <div class="item-title">${track.title}</div>
          <div class="item-sub">YouTube</div>
        </div>
        <div class="item-playing">
          <div class="mini-bar"></div>
          <div class="mini-bar"></div>
          <div class="mini-bar"></div>
        </div>
      `;
      item.onclick = () => { currentIndex = i; loadTrack(); };
      list.appendChild(item);
    });
  }

  function updateActiveItem() {
    document.querySelectorAll('.playlist-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex);
    });
    // Scroll active into view
    const active = document.getElementById('item-' + currentIndex);
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function loadTrack() {
    const track = PLAYLIST[currentIndex];
    document.getElementById('trackTitle').textContent = track.title;
    document.getElementById('trackIndex').textContent =
      'TRACK ' + (currentIndex + 1) + ' / ' + PLAYLIST.length;
    document.getElementById('artImg').src =
      'https://img.youtube.com/vi/' + track.id + '/maxresdefault.jpg';
    updateActiveItem();

    if (player && player.loadVideoById) {
      player.loadVideoById(track.id);
      isPlaying = true;
      setPlayState(true);
    }
  }

  function setPlayState(playing) {
    isPlaying = playing;
    document.getElementById('btnPlay').textContent = playing ? '⏸' : '▶';
    document.getElementById('vinylRing').classList.toggle('spinning', playing);
    document.getElementById('eqBars').classList.toggle('active', playing);
    document.getElementById('liveBadge').classList.toggle('visible', playing);
  }

  function formatTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
  }

  function startProgress() {
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (!player || !player.getCurrentTime) return;
      const cur = player.getCurrentTime();
      const dur = player.getDuration();
      if (dur > 0) {
        document.getElementById('progressBar').style.width = (cur / dur * 100) + '%';
        document.getElementById('timeCurrent').textContent = formatTime(cur);
        document.getElementById('timeDuration').textContent = formatTime(dur);
      }
    }, 500);
  }

  // YouTube API ready callback
  window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('yt-player', {
      height: '0', width: '0',
      videoId: PLAYLIST[0].id,
      playerVars: { autoplay: 0, controls: 0 },
      events: {
        onReady: (e) => {
          e.target.setVolume(80);
          document.getElementById('artImg').src =
            'https://img.youtube.com/vi/' + PLAYLIST[0].id + '/maxresdefault.jpg';
          document.getElementById('trackTitle').textContent = PLAYLIST[0].title;
          document.getElementById('trackIndex').textContent = 'TRACK 1 / ' + PLAYLIST.length;
          startProgress();
        },
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.PLAYING) {
            setPlayState(true);
            startProgress();
          } else if (e.data === YT.PlayerState.PAUSED) {
            setPlayState(false);
          } else if (e.data === YT.PlayerState.ENDED) {
            if (repeatOn) {
              player.playVideo();
            } else {
              nextTrack();
            }
          }
        }
      }
    });
  };

  function nextTrack() {
    if (shuffleOn) {
      currentIndex = Math.floor(Math.random() * PLAYLIST.length);
    } else {
      currentIndex = (currentIndex + 1) % PLAYLIST.length;
    }
    loadTrack();
  }

  function prevTrack() {
    currentIndex = (currentIndex - 1 + PLAYLIST.length) % PLAYLIST.length;
    loadTrack();
  }

  // Controls
  document.getElementById('btnPlay').onclick = () => {
    if (!player) return;
    if (isPlaying) { player.pauseVideo(); }
    else { player.playVideo(); }
  };

  document.getElementById('btnNext').onclick = nextTrack;
  document.getElementById('btnPrev').onclick = prevTrack;

  document.getElementById('btnShuffle').onclick = function() {
    shuffleOn = !shuffleOn;
    this.classList.toggle('active', shuffleOn);
  };

  document.getElementById('btnRepeat').onclick = function() {
    repeatOn = !repeatOn;
    this.classList.toggle('active', repeatOn);
  };

  document.getElementById('volSlider').oninput = function() {
    if (player && player.setVolume) player.setVolume(this.value);
  };

  document.getElementById('progressWrap').onclick = function(e) {
    if (!player || !player.getDuration) return;
    const pct = e.offsetX / this.offsetWidth;
    player.seekTo(player.getDuration() * pct, true);
  };

  // Init
  buildPlaylist();
</script>
</body>
</html>
